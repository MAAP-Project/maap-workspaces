name: notebook
channels:
  - conda-forge
  - nodefaults
dependencies:
  # Dependencies for VS Code IDE
  - code-server>=3.2
  - jupyter-vscode-proxy=0.7
  - pre_commit
  # Upgrade from ml notebook image
  - earthaccess>=0.16.0
  # Pin down to avoid https://github.com/holoviz/pyviz_comms/issues/143
  - pyviz_comms==3.0.4
  - nodejs=22.21.1
  - pip=25.2
  - pip:
    - jupyter-sshd-proxy==0.3.0
    - jupyterlab-bxplorer==0.2.30
    - git+https://github.com/MAAP-Project/jupyter-server-extension.git@develop
    - git+https://github.com/MAAP-Project/maap-py.git@v5.1.0a2
    - git+https://github.com/MAAP-Project/algorithms-jupyter-extension.git@develop
    - git+https://github.com/MAAP-Project/dps-jupyter-extension.git@develop
    # - maap-edsc-jupyter-extension==1.1.1
    - maap-help-jupyter-extension==2.0.2
    - maap-libs-jupyter-extension==1.2.5
    - git+https://github.com/MAAP-Project/user-workspace-management-jupyter-extension.git@develop